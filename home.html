<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/dinner (2).png">
    <title>Delizia</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="home">
        <div id="navbar"></div>
        <script src="script.js" ></script>
        <div class="home-container">
            <div class="home-info">
                <p>Exploring the Delicious World</p>
                <h1>The Perfect Space to Enjoy best Food</h1>
                <div class="search">
                    <input type="text" id="searchfood" placeholder="Search for your favorite food...">
                    <button onclick="searchitem()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <div style="display:flex;flex-direction: row;gap:40px">
                    <button onclick="window.location.href='tablebooking.html'">Book A Table<img src="images/arrow (1).png"></button>
                    <button onclick="window.location.href='menu.html'">View Menu<img src="images/arrow (1).png"></button>
                </div>
                <div class="home-items">
                    <img src="images/cheeseburger.jpeg" alt="cheeseburger">
                    <img src="images/bbqpizza.jpg" alt="bbqpizza">
                    <img src="images/waffle.jpg" alt="waffle">
                </div>
            </div>
                <div class="image">
                    <div class="circle"></div>
                        <img src="images/tacopasta.jpg" alt="pizza">
               </div>
            </div>
        </div>
    </div>
</body>
</html>
