<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/dinner (2).png">
    <title>Delizia</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="loginpage">
        <img src="images/restaurantimg.jpeg">
        <div class="login">
            <div style="display:flex; align-items:center; gap:10px;">
                    <img style="width:30px;height:30px" src="images/dinner (2).png" alt="Delizia Logo">
                    <h1>Delizia</h1>
            </div>
            <h1 style="font-size: 18px;color: #00897B;">Welcome</h1>
            <form>
                <div class="inputs">
                    <i class="fa-solid fa-user"></i>
                    <input type="email" name="email" id="email" placeholder=" Email"><br>
                </div>
                <div class="inputs">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="Password"><br>
                </div>
                <button type="button" onclick="window.location.href='index.html'">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
